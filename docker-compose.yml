version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vlrscraper
    command: python main.py
    volumes:
      - .:/app
    networks:
      vlr_scraper_net:
        driver: bridge
    ports:
      - "8000:8000"
    env_file:
      - .env